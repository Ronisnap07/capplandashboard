<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Planning Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-logo">CAPPLAN</div>
    <div class="login-sub">Editor Access — Masukkan Password</div>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk →</button>
  </div>
</div>

<header>
  <div class="logo">CAPPLAN <span id="header-sub">// Dashboard</span></div>
  <div class="hright">
    <span class="sync-info" id="sync-info">Memuat...</span>
    <button class="btn-refresh" onclick="loadAndRender()">↻ Refresh</button>
    <div class="editor-menu-wrap" id="editor-menu-wrap">
      <span class="badge" id="mode-badge" onclick="toggleEditorMenu()">👁 VIEW ONLY</span>
      <div class="editor-dropdown" id="editor-dropdown">
        <button onclick="openConfig()">⚙ Konfigurasi</button>
        <div class="editor-dropdown-sep"></div>
        <button class="logout-btn" onclick="logoutEditor()">↪ Logout</button>
      </div>
    </div>
  </div>
</header>

<nav id="main-nav"></nav>
<main id="main-content"></main>

<!-- Core -->
<script src="js/config.js"></script>
<script src="js/helpers.js"></script>
<script src="js/api.js"></script>

<!-- Views -->
<script src="js/views/overview.js"></script>
<script src="js/views/detail.js"></script>
<script src="js/views/growth.js"></script>
<script src="js/views/projection.js"></script>
<script src="js/views/editor.js"></script>
<script src="js/views/report.js"></script>

<!-- Excel -->
<script src="js/excel.js"></script>

<!-- App entry point -->
<script src="js/app.js"></script>

</body>
</html>
